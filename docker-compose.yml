name: tichu
services:
  server:
    build: ./server
    container_name: tichu-online
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL}
      - FIREBASE_SERVICE_ACCOUNT=${FIREBASE_SERVICE_ACCOUNT}
    depends_on:
      db:
        condition: service_healthy
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - app-network

  db:
    image: postgres:16-alpine
    container_name: tichu-db
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:55432:5432"
    environment:
      - POSTGRES_DB=tichu
      - POSTGRES_USER=tichu
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - DATABASE_URL=${DATABASE_URL}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tichu"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network

volumes:
  pgdata:

networks:
  app-network:
    external: true